<script>
(function(){
  "use strict";
  var EVENTS=[
    {name:"click_copy_trade",attr:"copy-trade",fbEvent:"Lead",
      classMatch:/(copy[-_]?trade|copy[-_]?now|follow[-_]?trader|nav[-_]?cta|btn[-_]?copy|btn[-_]?follow|copy[-_]?btn)/i,

    {name:"click_join",attr:"join",fbEvent:"CompleteRegistration",
      classMatch:/(btn[-_]?main|btn[-_]?outline|btn[-_]?sec|btn[-_]?join|btn[-_]?register|btn[-_]?signup|join[-_]?btn|register[-_]?btn|signup[-_]?btn|cta[-_]?main|cta[-_]?register)/i,
      hrefMatch:/(\/register|\/signup|\/sign[-_]?up|\/join|register\?|signup\?)/i,
      textMatch:/(join\s*now|sign\s*up|register(?:\s*now)?|\b(unete|rejoin|daftar|เข้าร่วม)\b)/i},
    {name:"click_login",attr:"login",fbEvent:"Contact",
      classMatch:/(btn[-_]?login|login[-_]?btn|sign[-_]?in[-_]?btn|btn[-_]?signin)/i,
      hrefMatch:/(\/login|\/signin|\/sign[-_]?in)/i,
      textMatch:/(^log\s*in$|^sign\s*in$|^login$|iniciar\s*sesion|masuk|เข้าสู่ระบบ)/i},
    {name:"click_redirect_platform",attr:"platform",fbEvent:"ViewContent",
      classMatch:/(btn[-_]?platform|platform[-_]?btn|open[-_]?platform|launch[-_]?platform)/i,
      hrefMatch:/(\/platform|platform\.wetrade|launch|open[-_]?trade)/i,
      textMatch:/(open\s*platform|launch\s*platform|go\s*to\s*platform|start\s*trading)/i}
  ];
  var UTM=(function(){try{var p=new URLSearchParams(window.location.search);return{utm_source:p.get("utm_source")||undefined,utm_medium:p.get("utm_medium")||undefined,utm_campaign:p.get("utm_campaign")||undefined,utm_content:p.get("utm_content")||undefined,utm_term:p.get("utm_term")||undefined};}catch(e){return{};}})();
  function base(){return Object.assign({page_location:window.location.href,page_title:document.title,page_hostname:window.location.hostname},UTM);}
  function send(n,p,fbEvent){
    if(typeof gtag==="function"){try{gtag("event",n,Object.assign(base(),p||{},{transport_type:"beacon"}));}catch(e){}}
  }
  function classify(el){
    if(!el||el.nodeType!==1)return null;
    var dt=el.getAttribute&&el.getAttribute("data-track");
    if(dt){for(var i=0;i<EVENTS.length;i++)if(EVENTS[i].attr===dt)return EVENTS[i];}
    var tag=(el.tagName||"").toUpperCase();
    if(tag!=="A"&&tag!=="BUTTON")return null;
    var cls=(typeof el.className==="string"?el.className:"")||"";
    var href=el.getAttribute&&el.getAttribute("href")||"";
    var text=(el.innerText||el.textContent||"").trim().toLowerCase();
    for(var j=0;j<EVENTS.length;j++){
      var d=EVENTS[j];
      if(d.classMatch&&cls&&d.classMatch.test(cls))return d;
      if(d.hrefMatch&&href&&d.hrefMatch.test(href))return d;
      if(d.textMatch&&text&&text.length<60&&d.textMatch.test(text))return d;
    }
    return null;
  }
  function info(el){return{element_text:(el.innerText||el.textContent||"").trim().slice(0,100)||undefined,element_id:el.id||undefined,element_classes:(typeof el.className==="string"?el.className.slice(0,80):undefined),element_href:el.href||undefined};}
  function bind(el){
    if(!el||el._wtBound)return;
    el._wtBound=true;
    var d=classify(el);
    if(!d)return;
    el._wtEvent=d.name;
    el.addEventListener("mousedown",function(e){if(e.button!==0)return;try{send(d.name,info(el),d.fbEvent);}catch(x){}},{capture:true,passive:true});
    el.addEventListener("touchstart",function(){try{send(d.name,info(el),d.fbEvent);}catch(x){}},{capture:true,passive:true});
  }
  function scan(){var n=document.querySelectorAll("a, button, [data-track]");for(var i=0;i<n.length;i++)bind(n[i]);}
  var SCROLLS=[25,50,75,100],fired={};
  function pct(){var e=document.documentElement,m=e.scrollHeight-e.clientHeight;return m<=0?100:Math.min(100,Math.round(window.scrollY/m*100));}
  function onScroll(){var p=pct();for(var i=0;i<SCROLLS.length;i++){var m=SCROLLS[i];if(p>=m&&!fired[m]){fired[m]=true;send("scroll_"+m,{scroll_depth:m});}}}
  window.addEventListener("scroll",onScroll,{passive:true});
  if(window.MutationObserver){var t;new MutationObserver(function(ms){for(var i=0;i<ms.length;i++)if(ms[i].addedNodes&&ms[i].addedNodes.length){clearTimeout(t);t=setTimeout(scan,100);return;}}).observe(document.body||document.documentElement,{childList:true,subtree:true});}
  var _ps=history.pushState;history.pushState=function(){_ps.apply(history,arguments);setTimeout(function(){send("page_view",{page_path:window.location.pathname});scan();},0);};
  window.addEventListener("popstate",function(){send("page_view",{page_path:window.location.pathname});scan();});
  function init(){scan();onScroll();}
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",init);else init();
  window.wetradeTracking={scan:scan,list:function(){var n=document.querySelectorAll("a, button, [data-track]"),r=[];for(var i=0;i<n.length;i++)if(n[i]._wtEvent)r.push({event:n[i]._wtEvent,text:(n[i].innerText||"").trim().slice(0,40),tag:n[i].tagName});console.table(r);return r.length+" CTAs bound";}};
})();

    radial-gradient(ellipse 80% 60% at 50% 30%, rgba(250,80,0,0.18), transparent 65%),
    radial-gradient(ellipse 50% 40% at 100% 100%, rgba(255,170,60,0.06), transparent 70%);
}
body.th-active{font-family:'Sarabun','Montserrat',sans-serif}

/* Diagonal grid texture for poster vibe */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0 1px, transparent 1px 24px),
    repeating-linear-gradient(-45deg, rgba(255,255,255,0.015) 0 1px, transparent 1px 24px);
  mask-image:radial-gradient(ellipse 80% 80% at 50% 40%, #000 20%, transparent 85%);
}

.page{
  position:relative;z-index:1;
  height:100vh;
  display:grid;
  grid-template-rows:auto 1fr auto auto;
  padding:0;
}

/* ——— HEADER ——— */
header{
  display:flex;align-items:center;justify-content:space-between;
  gap:1.5rem;
  padding:1.6rem 3rem 1.2rem;
  border-bottom:1px solid var(--border);
}
.logo img{height:26px;display:block;mix-blend-mode:lighten}
.header-meta{
  display:flex;align-items:center;gap:1.6rem;
  font-size:0.62rem;font-weight:700;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--muted2);
  font-variant-numeric:tabular-nums;
}
.header-meta .live{display:inline-flex;align-items:center;gap:8px;color:var(--white)}
.header-meta .live .dot{
  width:6px;height:6px;background:var(--orange);border-radius:50%;
  animation:bl 1.2s infinite;box-shadow:0 0 10px var(--orange);
}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0.25}}

.lang-sw{position:relative}
.lang-btn{
  background:none;border:none;cursor:pointer;
  font-family:inherit;
  font-size:0.62rem;font-weight:700;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--muted2);
  display:inline-flex;align-items:center;gap:7px;
  padding:0.3rem 0;
  border-bottom:1px solid var(--border-2);
  transition:color 0.15s, border-color 0.15s;
}
.lang-btn:hover{color:var(--orange);border-color:var(--orange)}
.lang-btn .chev{font-size:0.5rem;opacity:0.6;transition:transform 0.2s}
.lang-sw.open .lang-btn .chev{transform:rotate(180deg)}
.lang-drop{
  display:none;
  position:absolute;top:calc(100% + 10px);right:0;
  background:#0f0f0f;
  border:1px solid var(--border-2);
  overflow:hidden;
  min-width:180px;
  box-shadow:0 20px 50px rgba(0,0,0,0.8);
  z-index:200;
}
.lang-sw.open .lang-drop{display:block}
.lang-opt{
  display:flex;align-items:center;gap:10px;
  padding:0.7rem 1rem;cursor:pointer;
  font-size:0.75rem;font-weight:600;color:var(--muted2);
  border-bottom:1px solid var(--border);
  transition:all 0.15s;
}
.lang-opt:last-child{border-bottom:none}
.lang-opt:hover{background:rgba(250,80,0,0.1);color:var(--white)}
.lang-opt.active{color:var(--orange);font-weight:800}

/* ——— HERO: poster-style centered stack with extreme typography ——— */
main{
  position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
  padding:2rem 3rem;
  gap:1.4rem;
  overflow:hidden;
}

/* Giant background numeral — becomes design element */
.ghost-num{
  position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(18rem,38vw,42rem);
  line-height:0.8;
  letter-spacing:-0.03em;
  color:transparent;
  -webkit-text-stroke:1px rgba(250,80,0,0.14);
  text-stroke:1px rgba(250,80,0,0.14);
  white-space:nowrap;
  pointer-events:none;
  user-select:none;
  z-index:0;
  opacity:0.9;
}

.hero-stack{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:1.4rem}

.kicker{
  display:inline-flex;align-items:center;gap:12px;
  font-size:0.62rem;font-weight:800;letter-spacing:0.3em;
  text-transform:uppercase;color:var(--amber);
}
.kicker::before,.kicker::after{
  content:'';width:28px;height:1px;background:var(--amber);
}

h1{
  font-family:'Bebas Neue',sans-serif;
  font-weight:400;
  font-size:clamp(3.2rem,8.5vw,7.5rem);
  line-height:0.88;
  letter-spacing:0.02em;
  color:var(--white);
  max-width:16ch;
}
h1 .line{display:block}
h1 .accent{
  background:linear-gradient(120deg,var(--amber),var(--orange) 60%,#FF2A00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
body.th-active h1{
  font-family:'Sarabun','Montserrat',sans-serif;
  font-weight:900;
  font-size:clamp(2rem,5vw,4rem);
  line-height:1.15;
  letter-spacing:0;
  max-width:22ch;
}

.cta-row{
  display:flex;align-items:center;gap:1.5rem;
  flex-wrap:wrap;justify-content:center;
  margin-top:0.4rem;
}
.cta{
  display:inline-flex;align-items:center;gap:14px;
  background:var(--orange);
  color:#fff;
  padding:1.1rem 2.6rem;
  border-radius:3px;
  font-family:'Montserrat',sans-serif;
  font-size:0.85rem;font-weight:900;letter-spacing:0.18em;
  text-transform:uppercase;text-decoration:none;
  cursor:pointer;border:none;
  transition:all 0.25s cubic-bezier(0.2,0.8,0.2,1);
  position:relative;overflow:hidden;
  box-shadow:0 10px 40px rgba(250,80,0,0.4);
}
.cta::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--amber),#FF7A00);
  transform:translateY(101%);
  transition:transform 0.3s cubic-bezier(0.2,0.8,0.2,1);
}
.cta > *{position:relative;z-index:1}
.cta:hover::before{transform:translateY(0)}
.cta:hover{color:#000;box-shadow:0 14px 50px rgba(255,170,60,0.55)}
.cta .arrow{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.4rem;letter-spacing:0;
  transition:transform 0.25s;
}
.cta:hover .arrow{transform:translateX(6px)}
.cta-meta{
  font-size:0.62rem;font-weight:700;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--muted);
  display:inline-flex;align-items:center;gap:8px;
}
.cta-meta::before{
  content:'';width:6px;height:6px;background:#22c55e;border-radius:50%;
  animation:bl 1.6s infinite;box-shadow:0 0 8px #22c55e;
}

/* ——— LIVE TICKER (the leaderboard preview) ——— */
.ticker-wrap{
  position:relative;
  border-top:1px solid var(--border-2);
  border-bottom:1px solid var(--border-2);
  background:linear-gradient(180deg,var(--d1),var(--black));
  overflow:hidden;
  padding:1.1rem 0;
}
.ticker-wrap::before,.ticker-wrap::after{
  content:'';position:absolute;top:0;bottom:0;width:120px;z-index:2;
  pointer-events:none;
}
.ticker-wrap::before{left:0;background:linear-gradient(90deg,var(--black),transparent)}
.ticker-wrap::after{right:0;background:linear-gradient(-90deg,var(--black),transparent)}

.ticker-label{
  position:absolute;
  top:50%;left:3rem;transform:translateY(-50%);
  z-index:3;
  display:flex;align-items:center;gap:10px;
  background:var(--black);
  padding:0.4rem 1rem 0.4rem 0;
  font-size:0.58rem;font-weight:800;letter-spacing:0.22em;
  text-transform:uppercase;color:var(--orange);
  border-right:1px solid var(--border-2);
}
.ticker-label .pulse{
  width:6px;height:6px;background:var(--orange);border-radius:50%;
  animation:bl 1s infinite;box-shadow:0 0 8px var(--orange);
}

.ticker{
  display:flex;align-items:center;
  width:max-content;
  animation:scroll 38s linear infinite;
  padding-left:14rem;  /* space so label doesn't overlap */
}
.ticker-wrap:hover .ticker{animation-play-state:paused}
@keyframes scroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

.tk-item{
  display:inline-flex;align-items:baseline;gap:0.9rem;
  padding:0 2.2rem;
  border-right:1px solid var(--border);
  white-space:nowrap;
}
.tk-rk{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.3rem;letter-spacing:0.04em;
  color:var(--muted);line-height:1;
}
.tk-item.r1 .tk-rk{color:var(--gold)}
.tk-item.r2 .tk-rk{color:var(--silver)}
.tk-item.r3 .tk-rk{color:var(--bronze)}
.tk-name{
  font-family:'Montserrat',sans-serif;
  font-size:0.88rem;font-weight:800;color:var(--white);
  letter-spacing:0.02em;
}
.tk-rate{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.5rem;letter-spacing:0.02em;
  color:var(--orange);line-height:1;
  font-variant-numeric:tabular-nums;
}
.tk-diamond{
  color:var(--orange);
  font-size:0.6rem;
  opacity:0.5;
  padding:0 1.5rem;
}

/* ——— FOOTER ——— */
footer{
  display:flex;justify-content:space-between;align-items:center;
  gap:1rem;
  padding:1rem 3rem;
  font-size:0.55rem;font-weight:600;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--muted);
}
footer a{color:inherit;text-decoration:none;transition:color 0.15s;border-bottom:1px solid transparent}
footer a:hover{color:var(--orange);border-color:var(--orange)}
.foot-risk{flex:1;text-align:center}

/* ——— RESPONSIVE ——— */
@media(max-width:900px){
  header{padding:1rem 1.2rem 0.9rem}
  main{padding:1.5rem 1.2rem;gap:1.1rem}
  .ghost-num{font-size:clamp(14rem,55vw,22rem)}
  h1{font-size:clamp(2.4rem,10vw,4rem)}
  body.th-active h1{font-size:clamp(1.6rem,6.5vw,2.6rem)}
  .cta{padding:0.95rem 2rem;font-size:0.76rem}
  .ticker-wrap{padding:0.9rem 0}
  .ticker-label{left:1.2rem;padding-right:0.8rem}
  .ticker{padding-left:9rem}
  .tk-item{padding:0 1.2rem;gap:0.6rem}
  .tk-rate{font-size:1.2rem}
  .tk-name{font-size:0.78rem}
  footer{padding:0.9rem 1.2rem;font-size:0.48rem}
  .foot-risk{display:none}
  .header-meta .live{display:none}
  .header-meta{gap:1rem}
}
@media(max-width:520px){
  .kicker{font-size:0.55rem;letter-spacing:0.22em}
  .kicker::before,.kicker::after{width:18px}
  .ticker-label{font-size:0.52rem}
}
/* ——— REGISTER MODAL ——— */
.modal-backdrop{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:999;
  opacity:0;visibility:hidden;
  transition:opacity 0.3s ease, visibility 0.3s ease;
  display:flex;align-items:center;justify-content:center;
  padding:1rem;
}
.modal-backdrop.open{opacity:1;visibility:visible}

.modal{
  position:relative;
  width:100%;
  max-width:480px;
  height:min(680px,calc(100vh - 2rem));
  background:var(--d1);
  border:1px solid var(--border-2);
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,0.7), 0 0 60px rgba(250,80,0,0.15);
  transform:translateY(30px) scale(0.97);
  transition:transform 0.35s cubic-bezier(0.2,0.8,0.2,1);
  display:flex;flex-direction:column;
}
.modal-backdrop.open .modal{transform:translateY(0) scale(1)}

.modal::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--orange) 30%,var(--amber) 70%,transparent);
  z-index:2;
}

.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.3rem;
  border-bottom:1px solid var(--border);
  background:var(--black);
  flex-shrink:0;
}
.modal-title{
  font-size:0.65rem;font-weight:800;letter-spacing:0.22em;
  text-transform:uppercase;color:var(--orange);
  display:inline-flex;align-items:center;gap:8px;
}
.modal-title::before{
  content:'';width:6px;height:6px;background:var(--orange);border-radius:50%;
  animation:bl 1.2s infinite;box-shadow:0 0 8px var(--orange);
}
.modal-close{
  background:none;border:none;cursor:pointer;
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted2);
  font-size:1.2rem;line-height:1;
  border-radius:3px;
  transition:all 0.15s;
}
.modal-close:hover{background:rgba(255,255,255,0.08);color:var(--white)}

.modal-body{
  flex:1;
  position:relative;
  background:#fff;  /* iframe background fallback */
  overflow:hidden;
}
.modal-iframe{
  width:100%;height:100%;
  border:none;display:block;
}
.modal-loading{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:0.8rem;
  background:var(--d1);
  color:var(--muted);
  font-size:0.7rem;font-weight:700;letter-spacing:0.16em;
  text-transform:uppercase;
  transition:opacity 0.25s, visibility 0.25s;
}
.modal-loading.hidden{opacity:0;visibility:hidden}
.modal-loading .spinner{
  width:36px;height:36px;
  border:2px solid var(--border-2);
  border-top-color:var(--orange);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:520px){
  .modal{height:calc(100vh - 1rem);max-width:100%;border-radius:6px}
  .modal-head{padding:0.85rem 1rem}
}
</style>

function renderHeadline(lang){
  const t = T[lang];
  document.getElementById('headline').innerHTML =
    '<span class="line">' + t.h1Pre + '<span class="accent">' + t.h1Accent + '</span></span>' +
    '<span class="line">' + t.h1Post.trim() + '</span>';
}

function setLang(lang){
  const t = T[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.textContent = t[key];
  });
  renderHeadline(lang);
  document.getElementById('langFlag').textContent = t.flag;
  document.getElementById('langCode').textContent = t.code;
  document.documentElement.lang = lang;
  document.body.classList.toggle('th-active', lang === 'th');
  document.querySelectorAll('.lang-opt').forEach(el => {
    el.classList.toggle('active', el.dataset.lang === lang);
  });
  // Update iframe src if modal is open with new language
  syncIframeLang();
  document.getElementById('langSw').classList.remove('open');
  try { localStorage.setItem('wetrade-min-lang', lang); } catch(e) {}
}

const REGISTER_BASE = 'https://register.wetradebroker.com/ld-register?source=GB_LP_MDLT_202604';

function buildRegisterUrl(lang){
  // Append language param while preserving the existing source param
  const sep = REGISTER_BASE.includes('?') ? '&' : '?';
  return `${REGISTER_BASE}${sep}language=${lang}`;
}

function syncIframeLang(){
  const iframe = document.getElementById('registerIframe');
  if (iframe && iframe.src) {
    // only reload if modal already opened
    iframe.src = buildRegisterUrl(document.documentElement.lang || 'en');
  }
}

function openRegister(){
  const backdrop = document.getElementById('modalBackdrop');
  const iframe = document.getElementById('registerIframe');
  const loading = document.getElementById('modalLoading');
  const lang = document.documentElement.lang || 'en';

  loading.classList.remove('hidden');
  iframe.src = buildRegisterUrl(lang);
  iframe.onload = () => loading.classList.add('hidden');

  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeRegister(){
  const backdrop = document.getElementById('modalBackdrop');
  backdrop.classList.remove('open');
  document.body.style.overflow = '';
  // Clear iframe after transition to free resources & reset form state for next open
  setTimeout(() => {
    const iframe = document.getElementById('registerIframe');
    iframe.src = 'about:blank';
  }, 350);
}

function closeRegisterIfBackdrop(e){
  if (e.target.id === 'modalBackdrop') closeRegister();
}

// ESC key closes modal
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeRegister();
});

function toggleLang(e){
  e.stopPropagation();
  document.getElementById('langSw').classList.toggle('open');
}

document.getElementById('langDrop').innerHTML = Object.keys(T).map(l =>
  `<div class="lang-opt" data-lang="${l}" onclick="setLang('${l}')">${T[l].flag} ${T[l].langName}</div>`
).join('');

document.addEventListener('click', () => {
  document.getElementById('langSw').classList.remove('open');
});

(function init(){
  // Priority: 1) ?lang= URL param, 2) saved preference, 3) browser language, 4) English
  let chosen = null;

  // 1. URL parameter ?lang=xx (also accepts ?language=xx for compatibility)
  try {
    const params = new URLSearchParams(window.location.search);
    const urlLang = (params.get('lang') || params.get('language') || '').toLowerCase();
    if (urlLang && T[urlLang]) chosen = urlLang;
  } catch(e) {}

  // 2. Saved preference from previous visit
  if (!chosen) {
    try {
      const saved = localStorage.getItem('wetrade-min-lang');
      if (saved && T[saved]) chosen = saved;
    } catch(e) {}
  }

  // 3. Browser language
  if (!chosen) {
    const browserLang = (navigator.language || 'en').toLowerCase().split('-')[0];
    if (T[browserLang]) chosen = browserLang;
  }

  // 4. Fallback
  setLang(chosen || 'en');
})();
</script>
